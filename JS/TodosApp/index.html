<!DOCTYPE html>
<html lan="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width" initial-scale="1.0">
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <link rel="icon" href="data:;base64,iVBORw0KGgo=">
        <script>
            async function addTodo(){
                const token=localStorage.getItem("token");
                const textTodo=document.getElementById("inputTodo").value;
                try{
                    const response=await axios.post("http://localhost:3000/todos",{
                        todo:textTodo},{headers:{authorization:token}})

                    const {todoId,todo}=response.data;

                    const container=document.getElementById("viewTodos");   // parentDiv

                    const addText=document.createElement("div");
                    addText.id=`todo-${todoId}`;
                    // addText.setAttribute("id",'todo-', todoId);
                    addText.textContent=`${todoId} ${todo}`;

                    container.appendChild(addText);

                    document.getElementById("inputTodo").value=""; 
                }
                catch(e){
                    alert("invalid token");
                    console.error(e);
                }
            }

            async function deleteTodo(){
                const token=localStorage.getItem("token");
                const removeTodo=document.getElementById("deleteTodo").value;
                try{
                    const response=await axios.delete("http://localhost:3000/todos",{
                        headers:{authorization:token},
                        data:{todoId:removeTodo}
                    })

                    // wrong code
                     const container=document.getElementById("viewTodos");
                    // const element=document.getElementById(`todo-${removeTodo}`);
                    // container.removeChild(element);
                    // document.gotElementById("deleteTodo").value="";

                    // You MUST check if the element exists before asking the container to remove it
                    const element = document.getElementById(`todo-${removeTodo}`);
                    if (element && container) {
                        container.removeChild(element);
                    }
                    document.getElementById("deleteTodo").value="";
                }

                catch(e){
                    alert("invalid token");
                    console.error(e);
                }
            }

            async function updateTodo(){
                const token=localStorage.getItem("token");
                const inputTodoText=document.getElementById("updateTodo").value;
                const inputTodoId=document.getElementById("upTodoId").value;
                try{
                    const response= await axios.put("http://localhost:3000/todos",{
                        todoId:inputTodoId,
                        todo:inputTodoText
                    }, {headers:{authorization:token}})

                    const {todoId, todo}=response.data;

                    // wrong code- creating a new div rather than updating one
                    // const container=document.getElementById("viewTodos");
                    // const upTodo=document.createElement("div");

                    // upTodo.id=`todo-${todoId}`;
                    // upTodo.textContent=`${todoId} ${todo}`;
                   
                    // container.appendChild(upTodo);

                    const existingTodo=document.getElementById(`todo-${todoId}`);
                    if(existingTodo){
                        existingTodo.textContent=`${todoId} ${todo}`;
                    }

                    document.getElementById("updateTodo").value="";
                    document.getElementById("upTodoId").value="";
                }
                catch(e){
                    alert("invalid token");
                    console.error(e);
                }
            }

            async function getTodo(){
                const token=localStorage.getItem("token");
                try{
                    const response=await axios.get("http://localhost:3000/todos",{
                        headers:{authorization:token}
                    });

                    const userTodos=response.data.userTodos;

                    document.getElementById("viewTodos").innerHTML="";     // clears any existing todo

                    for(let i=0;i<userTodos.length;i++){
                       // const container=document.getElementById("viewTodos");
                        const todos=document.createElement("div");
                        todos.id=`todo-${userTodos[i].todoId}`;
                        todos.textContent=`${userTodos[i].todoId} ${userTods[i].todo}`;
                        //container.appendChild(todos);
                        document.getElementById("viewTodos").appendChild(todos);
                    }

                }
                catch(e){
                    alert("invalid token");
                   // console.error(e);
                   console.dir(e);
                }
            }
            getTodo();
        </script>

    </head>

    <body>
        <div style="display:flex; justify-content:space-between">
            <div id="tools">
                <div>

                    <div>
                        <input id="inputTodo" type="text" placeholder="your todo" />
                    </div>
                    <div>
                        <button onclick="addTodo()">Add</button>
                    </div>

                    <div>
                        <input id="deleteTodo" type="text" placeholder="your todo id" />
                    </div>
                    <div>
                        <button onclick="deleteTodo()">Delete</button>
                    </div>

                    <div>
                        <input id="upTodoId" type="number" placeholder="your todo id" />
                    </div>
                    <div>
                        <input id="updateTodo" type="text" placeholder="your todo" />
                    </div>
                    <div>
                        <button onclick="updateTodo()">Update</button>
                    </div>

                </div>
            </div>

            <div id="viewTodos">

            </div>
        </div>
    </body>
</html>
